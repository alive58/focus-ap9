<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحدّي التركيز</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<style>
  :root {
    --bg: #0a0f0d;
    --surface: #111a15;
    --surface2: #1a2620;
    --accent: #00e5a0;
    --text: #e8f5ee;
    --muted: #5a7a68;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }

  /* شاشة الدخول */
  #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .auth-card { background: var(--surface); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid var(--surface2); width: 90%; max-width: 400px; }
  .google-btn { width: 100%; padding: 12px; margin-top: 20px; background: white; color: #333; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

  .container { width: 100%; max-width: 420px; display: none; }
  .container.show { display: block; }

  /* الهيدر وشريط المستخدم */
  .user-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding: 10px; background: var(--surface); border-radius: 12px; }
  .user-info { display: flex; align-items: center; gap: 10px; }
  .user-info img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--accent); }

  .header { text-align: center; margin-bottom: 20px; }
  .header h1 { font-size: 1.8rem; font-weight: 900; }
  .header h1 span { color: var(--accent); }

  /* الأزرار والتبويبات (نفس التصميم في الصورة) */
  .tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
  .tab { padding: 8px 20px; background: var(--surface); border-radius: 10px; color: var(--muted); cursor: pointer; font-weight: 700; transition: 0.3s; }
  .tab.active { background: var(--accent); color: #0a0f0d; }

  .durations { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
  .dur-btn { padding: 6px 12px; background: var(--surface2); border: 1px solid var(--surface2); color: var(--muted); border-radius: 8px; cursor: pointer; font-family: 'Tajawal'; }
  .dur-btn.active { border-color: var(--accent); color: var(--accent); }

  /* المؤقت الدائري */
  .timer-wrap { position: relative; width: 220px; height: 220px; margin: 30px auto; }
  svg { transform: rotate(-90deg); }
  .circle-bg { fill: none; stroke: var(--surface2); stroke-width: 6; }
  .circle-prog { fill: none; stroke: var(--accent); stroke-width: 6; stroke-dasharray: 628; stroke-dashoffset: 0; transition: 1s linear; stroke-linecap: round; }
  .timer-display { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; font-weight: 900; }

  .start-btn { width: 100%; padding: 18px; background: var(--accent); color: #0a0f0d; border: none; border-radius: 15px; font-size: 1.2rem; font-weight: 900; cursor: pointer; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,229,160,0.2); }

  /* السجل */
  .stats-box { background: var(--surface); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--surface2); }
  .stats-val { font-size: 1.5rem; font-weight: 900; color: var(--accent); }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <h1 style="color: var(--accent);">رين 🎯</h1>
    <p style="margin-top: 10px;">سجل دخولك لحفظ دقائق تركيزك</p>
    <button class="google-btn" onclick="login()">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18">
      الدخول بواسطة جوجل
    </button>
  </div>
</div>

<div class="container" id="app">
  <div class="user-bar">
    <div class="user-info">
      <img id="u-img" src="">
      <span id="u-name" style="font-weight: 700; font-size: 0.9rem;">تحميل...</span>
    </div>
    <span onclick="logout()" style="color: var(--muted); cursor: pointer; font-size: 0.8rem;">تسجيل خروج</span>
  </div>

  <div class="header">
    <h1>تحدّي <span>التركيز</span> 🎯</h1>
    <p style="font-size: 0.8rem; color: var(--muted); margin-top: 5px;">ضع جوالك على الطاولة وابدأ</p>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-pomo">بومودورو 🍅</div>
    <div class="tab">مؤقت حر ⏱️</div>
  </div>

  <div class="durations">
    <button class="dur-btn" onclick="setDur(5)">5 دقائق</button>
    <button class="dur-btn" onclick="setDur(10)">10 دقائق</button>
    <button class="dur-btn active" id="d-25" onclick="setDur(25)">25 دقيقة</button>
    <button class="dur-btn" onclick="setDur(45)">45 دقيقة</button>
  </div>

  <div class="timer-wrap">
    <svg width="220" height="220">
      <circle class="circle-bg" cx="110" cy="110" r="100"/>
      <circle class="circle-prog" id="prog" cx="110" cy="110" r="100"/>
    </svg>
    <div class="timer-display" id="display">25:00</div>
  </div>

  <button class="start-btn" id="s-btn" onclick="start()">ابدأ التحدي</button>

  <div class="stats-box">
    <div class="stats-val" id="total-mins">0 د</div>
    <p style="font-size: 0.8rem; color: var(--muted);">سجل الدراسة التراكمي</p>
  </div>
</div>

<script>
  // بيانات Firebase الخاصة بك
  const firebaseConfig = {
    apiKey: "AIzaSyBf0jgQOn0tkmCUd5ZVy5qkEaZG6YfRB7U",
    authDomain: "p10-t-2940b.firebaseapp.com",
    projectId: "p10-t-2940b",
    storageBucket: "p10-t-2940b.firebasestorage.app",
    messagingSenderId: "123981816702",
    appId: "1:123981816702:web:e112d6855ad8b93169092f"
  };
  firebase.initializeApp(firebaseConfig);

  let timer, remaining = 1500, total = 1500, running = false;
  let user = null;

  function login() {
    const provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider).then(res => setup(res.user));
  }

  function setup(u) {
    user = u;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').classList.add('show');
    document.getElementById('u-name').textContent = u.displayName;
    document.getElementById('u-img').src = u.photoURL;
    loadStats();
  }

  function setDur(m) {
    if(running) return;
    remaining = m * 60; total = remaining;
    updateUI();
    document.querySelectorAll('.dur-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(m)));
  }

  function start() {
    if(running) { location.reload(); return; }
    running = true;
    document.getElementById('s-btn').textContent = "إيقاف (سيضيع الوقت)";
    document.getElementById('s-btn').style.background = "#ff4d6d";
    
    timer = setInterval(() => {
      remaining--;
      updateUI();
      if(remaining <= 0) {
        clearInterval(timer);
        save();
      }
    }, 1000);
  }

  function updateUI() {
    const m = Math.floor(remaining / 60).toString().padStart(2, '0');
    const s = (remaining % 60).toString().padStart(2, '0');
    document.getElementById('display').textContent = `${m}:${s}`;
    document.getElementById('prog').style.strokeDashoffset = 628 * (1 - (remaining / total));
  }

  function save() {
    let data = JSON.parse(localStorage.getItem('rec_' + user.uid) || '{"mins":0}');
    data.mins += Math.floor(total / 60);
    localStorage.setItem('rec_' + user.uid, JSON.stringify(data));
    alert("بطل يا علي! تم حفظ الوقت في سجلك.");
    location.reload();
  }

  function loadStats() {
    let data = JSON.parse(localStorage.getItem('rec_' + user.uid) || '{"mins":0}');
    document.getElementById('total-mins').textContent = data.mins + " د";
  }

  function logout() { firebase.auth().signOut().then(() => location.reload()); }
  firebase.auth().onAuthStateChanged(u => { if(u) setup(u); });
</script>
</body>
</html>
