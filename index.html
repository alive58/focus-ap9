<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رين - تحدي التركيز</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --accent: #00e5a0;
            --text: #c9d1d9;
            --danger: #f85149;
            --surface2: #30363d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

        #auth-screen { text-align: center; background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid var(--surface2); width: 100%; max-width: 400px; }
        .google-btn { width: 100%; padding: 14px; margin-top: 25px; background: white; color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        #app { display: none; width: 100%; max-width: 420px; }
        .active-app { display: block !important; }

        .profile-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .profile-info { display: flex; align-items: center; gap: 10px; }
        .profile-info img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent); }

        .main-card { background: var(--card); padding: 30px; border-radius: 28px; border: 1px solid var(--surface2); text-align: center; }
        
        .time-selector { display: flex; gap: 8px; justify-content: center; margin: 15px 0; flex-wrap: wrap; }
        .time-btn { padding: 8px 16px; background: #21262d; border: 1px solid var(--surface2); color: var(--text); border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .time-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        /* خانة التخصيص */
        .custom-time-input { display: flex; gap: 5px; justify-content: center; margin-bottom: 20px; }
        .custom-time-input input { background: #21262d; border: 1px solid var(--surface2); border-radius: 8px; color: var(--accent); padding: 8px; width: 80px; text-align: center; font-weight: bold; outline: none; }
        .custom-time-input button { background: var(--surface2); color: white; border: none; border-radius: 8px; padding: 0 15px; cursor: pointer; font-size: 0.8rem; }

        .timer-container { position: relative; width: 180px; height: 180px; margin: 20px auto; }
        svg { transform: rotate(-90deg); width: 180px; height: 180px; }
        circle { fill: none; stroke-width: 8; stroke-linecap: round; }
        .circle-bg { stroke: #21262d; }
        .circle-progress { stroke: var(--accent); stroke-dasharray: 502; stroke-dashoffset: 0; transition: 1s linear; }
        .time-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; font-weight: 900; color: #fff; }

        .control-btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-size: 1.2rem; font-weight: 900; cursor: pointer; background: var(--accent); color: #000; transition: 0.3s; }
        .control-btn.stop { background: var(--danger); color: #fff; }

        .stats { margin-top: 20px; padding: 15px; background: #21262d; border-radius: 15px; display: flex; justify-content: space-around; }
        .stat-item span { display: block; font-weight: 900; color: var(--accent); font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="color: var(--accent);">رين 🎯</h1>
        <button class="google-btn" onclick="login()">دخول عبر جوجل</button>
    </div>

    <div id="app">
        <div class="profile-bar">
            <div class="profile-info">
                <img id="user-avatar" src="">
                <span id="user-name">تحميل...</span>
            </div>
            <button onclick="logout()" style="background: none; border: none; color: var(--danger); cursor: pointer;">خروج</button>
        </div>

        <div class="main-card">
            <h3>حدد وقت التركيز</h3>
            
            <div class="time-selector" id="selectors">
                <button class="time-btn" onclick="changeTime(5, this)">5 د</button>
                <button class="time-btn active" onclick="changeTime(25, this)">25 د</button>
                <button class="time-btn" onclick="changeTime(50, this)">50 د</button>
            </div>

            <div class="custom-time-input" id="custom-area">
                <input type="number" id="manual-mins" placeholder="دقيقة">
                <button onclick="applyManualTime()">تخصيص</button>
            </div>

            <div class="timer-container">
                <svg viewBox="0 0 180 180">
                    <circle class="circle-bg" cx="90" cy="90" r="80"></circle>
                    <circle class="circle-progress" id="progress-bar" cx="90" cy="90" r="80"></circle>
                </svg>
                <div class="time-text" id="display">25:00</div>
            </div>

            <button class="control-btn" id="main-btn" onclick="toggleTimer()">ابدأ التركيز</button>
        </div>

        <div class="stats">
            <div class="stat-item"><span id="total-minutes">0</span><label>إجمالي الدقائق</label></div>
            <div class="stat-item"><span id="rank-text">مبتدئ</span><label>الرتبة</label></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBf0jgQOn0tkmCUd5ZVy5qkEaZG6YfRB7U",
            authDomain: "p10-t-2940b.firebaseapp.com",
            projectId: "p10-t-2940b",
            storageBucket: "p10-t-2940b.firebasestorage.app",
            messagingSenderId: "123981816702",
            appId: "1:123981816702:web:e112d6855ad8b93169092f"
        };
        firebase.initializeApp(firebaseConfig);

        let timer, remaining, totalSeconds, isRunning = false;
        let selectedMins = 25;
        let userUID = null;

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then(res => setupUser(res.user));
        }

        function setupUser(user) {
            userUID = user.uid;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').classList.add('active-app');
            document.getElementById('user-name').textContent = user.displayName;
            document.getElementById('user-avatar').src = user.photoURL;
            loadStats();
            resetTimer();
        }

        function changeTime(m, btn) {
            if(isRunning) return;
            selectedMins = m;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            resetTimer();
        }

        function applyManualTime() {
            const val = document.getElementById('manual-mins').value;
            if(val > 0 && val < 1000) {
                changeTime(parseInt(val), null);
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            }
        }

        function resetTimer() {
            remaining = selectedMins * 60;
            totalSeconds = remaining;
            updateUI();
        }

        function toggleTimer() {
            if(isRunning) { location.reload(); return; }
            isRunning = true;
            document.getElementById('main-btn').textContent = "إيقاف";
            document.getElementById('main-btn').classList.add('stop');
            document.getElementById('selectors').style.pointerEvents = "none";
            document.getElementById('custom-area').style.pointerEvents = "none";

            timer = setInterval(() => {
                remaining--;
                updateUI();
                if(remaining <= 0) {
                    clearInterval(timer);
                    finishSession();
                }
            }, 1000);
        }

        function updateUI() {
            let m = Math.floor(remaining / 60).toString().padStart(2, '0');
            let s = (remaining % 60).toString().padStart(2, '0');
            document.getElementById('display').textContent = `${m}:${s}`;
            let offset = 502 * (1 - (remaining / totalSeconds));
            document.getElementById('progress-bar').style.strokeDashoffset = offset;
        }

        function finishSession() {
            let stats = JSON.parse(localStorage.getItem('rein_data_' + userUID) || '{"mins":0}');
            stats.mins += selectedMins;
            localStorage.setItem('rein_data_' + userUID, JSON.stringify(stats));
            alert("بطل! أضفت " + selectedMins + " دقيقة لسجلك.");
            location.reload();
        }

        function loadStats() {
            let stats = JSON.parse(localStorage.getItem('rein_data_' + userUID) || '{"mins":0}');
            document.getElementById('total-minutes').textContent = stats.mins;
            if(stats.mins >= 100) document.getElementById('rank-text').textContent = "مكافح 🔥";
        }

        function logout() { firebase.auth().signOut().then(() => location.reload()); }
        firebase.auth().onAuthStateChanged(user => { if(user) setupUser(user); });
    </script>
</body>
</html>
